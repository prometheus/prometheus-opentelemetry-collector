dist:
  module: github.com/prometheus/prometheus-opentelemetry-collector/cmd/prometheusotelcol
  name: prometheus-otelcol
  description: Prometheus-flavored OpenTelemetry Collector distribution.
  output_path: ./_build
  version: 0.1.0-dev

receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusremotewritereceiver v0.149.0
  - gomod: github.com/prometheus-community/stackdriver_exporter/otelcollector v0.0.0-20260402160934-18907dbf328b

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.149.0
  - gomod: go.opentelemetry.io/collector/processor/memorylimiterprocessor v0.149.0

exporters:
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.149.0
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.149.0
  - gomod: go.opentelemetry.io/collector/exporter/otlphttpexporter v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusexporter v0.149.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/exporter/prometheusremotewriteexporter v0.149.0

extensions:
  - gomod: go.opentelemetry.io/collector/extension/zpagesextension v0.149.0

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.55.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.55.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v1.55.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v1.55.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.55.0

telemetry:
  gomod: go.opentelemetry.io/collector/service v0.149.0
  import: go.opentelemetry.io/collector/service/telemetry/otelconftelemetry

replaces:
  - github.com/prometheus-community/stackdriver_exporter => github.com/prometheus-community/stackdriver_exporter v0.18.1-0.20260402160934-18907dbf328b
  - github.com/ArthurSens/prometheus-collector-bridge => github.com/prometheus/opentelemetry-collector-bridge v0.0.0-20260317204527-5fc426455618
